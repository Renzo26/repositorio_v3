server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;
    gzip_min_length 1024;

    # Hashed build assets: cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # GLB/3D models and other static public/ files: cache, but allow revalidation.
    location ~* \.(glb|gltf|woff2?|png|jpg|jpeg|webp|svg|ico)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # SPA fallback: React Router (BrowserRouter) needs every unknown path to
    # resolve to index.html, otherwise deep links 404 on refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
